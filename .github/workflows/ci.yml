name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Test
    env:
      NEXT_PUBLIC_STACK_AI_BASE_URL: ${{ secrets.NEXT_PUBLIC_STACK_AI_BASE_URL }}
      NEXT_PUBLIC_STACK_AI_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_STACK_AI_SUPABASE_URL }}
      NEXT_PUBLIC_STACK_AI_ANON_KEY: ${{ secrets.NEXT_PUBLIC_STACK_AI_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:coverage
